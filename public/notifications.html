<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - CRM</title>
    <meta name="description" content="View vehicle expiry notifications and alerts">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1050;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        body.modal-open { overflow: hidden; }
        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 600px;
            padding: 1.75rem;
            box-shadow: 0 24px 48px rgba(0,0,0,0.15);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .btn-secondary {
            padding: 0.6rem 1.25rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-default);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: var(--border-light); }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        @media (max-width: 576px) {
            .form-row { grid-template-columns: 1fr; }
        }

        /* Date color classes */
        .date-expired { color: var(--danger) !important; font-weight: 700; }
        .date-today  { color: #d97706 !important; font-weight: 700; }
        .date-future { color: var(--success) !important; font-weight: 600; }

        /* Edit button on notification card */
        .notification-edit-btn {
            padding: 0.4rem 0.85rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            white-space: nowrap;
        }
        .notification-edit-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="header-container"></div>
            <div class="page-content custom-scrollbar">

                <!-- Page Title -->
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
                    <div>
                        <h2 style="font-size:1.25rem;font-weight:700;color:var(--text-dark);margin:0;">Notifications</h2>
                        <p style="font-size:0.8rem;color:var(--text-muted);margin:0.25rem 0 0;">Vehicle expiry alerts and renewal reminders</p>
                    </div>
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <span class="urgency-badge critical" id="criticalCount">0 Critical</span>
                        <span class="urgency-badge warning" id="warningCount">0 Warnings</span>
                        <span class="urgency-badge normal" id="normalCount">0 Normal</span>
                    </div>
                </div>

                <!-- Filters -->
                <div class="glass-card mb-4" style="padding:1rem 1.5rem;">
                    <div class="container-fluid p-0">
                        <div class="row g-3 align-items-end">
                            <div class="col-12 col-sm-4 col-lg-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="filterTab">
                                    <option value="fc">FC Expiry</option>
                                    <option value="np">National Permit</option>
                                    <option value="permit">Permit</option>
                                    <option value="road_tax">Road Tax</option>
                                </select>
                            </div>
                            <div class="col-12 col-sm-4 col-lg-3">
                                <label class="form-label">Sort Order</label>
                                <select class="form-select" id="filterSort">
                                    <option value="asc">Earliest First</option>
                                    <option value="desc">Latest First</option>
                                </select>
                            </div>
                            <div class="col-12 col-sm-4 col-lg-3">
                                <label class="form-label">Threshold (days)</label>
                                <select class="form-select" id="filterThreshold">
                                    <option value="15">15 Days</option>
                                    <option value="30">30 Days</option>
                                    <option value="45" selected>45 Days</option>
                                    <option value="60">60 Days</option>
                                    <option value="90">90 Days</option>
                                </select>
                            </div>
                            <div class="col-12 col-lg-3">
                                <button class="btn-primary" onclick="loadNotifications()" style="width:100%;justify-content:center;">
                                    <i data-lucide="filter" style="width:16px;height:16px;"></i> Apply Filters
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Notification Cards -->
                <div class="glass-card" style="padding:1.5rem;">
                    <div id="notificationsContainer">
                        <div class="empty-state">
                            <span class="spinner dark"></span>
                            <p style="margin-top:0.75rem;">Loading notifications...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ========== EDIT VEHICLE MODAL ========== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <h3 class="modal-title">
                <i data-lucide="pencil" style="width:20px;height:20px;color:var(--primary);"></i>
                Edit Vehicle Details
            </h3>
            <form id="editVehicleForm" autocomplete="off">
                <input type="hidden" id="editVehicleId" value="">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="editOwnerName">Owner Name *</label>
                        <input type="text" id="editOwnerName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editPhone">Phone</label>
                        <input type="tel" id="editPhone" class="form-control">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="editCompany">Company</label>
                        <input type="text" id="editCompany" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editVehicleNumber">Vehicle Number *</label>
                        <input type="text" id="editVehicleNumber" class="form-control" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="editVehicleType">Vehicle Type</label>
                        <select id="editVehicleType" class="form-select">
                            <option value="">Select type...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editRoadTaxAmount">Road Tax Amount (₹)</label>
                        <input type="number" id="editRoadTaxAmount" class="form-control">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="editFcExpiry">FC Expiry</label>
                        <input type="date" id="editFcExpiry" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editNp">National Permit (NP)</label>
                        <input type="date" id="editNp" class="form-control">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="editPermit">Permit</label>
                        <input type="date" id="editPermit" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editRoadTax">Road Tax Date</label>
                        <input type="date" id="editRoadTax" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editNotes">Notes</label>
                    <textarea id="editNotes" class="form-control" rows="2" style="resize:vertical;"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="editSubmitBtn" style="padding:0.6rem 1.5rem;">
                        <i data-lucide="check" style="width:16px;height:16px;"></i>
                        <span id="editSubmitText">Save Changes</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = generateSidebarHTML('notifications');
        document.getElementById('header-container').innerHTML = generateHeaderHTML();

        // Store notification data for editing
        let notificationData = [];

        async function loadNotifications() {
            const tab = document.getElementById('filterTab').value;
            const sort = document.getElementById('filterSort').value;
            const threshold = document.getElementById('filterThreshold').value;
            const container = document.getElementById('notificationsContainer');

            container.innerHTML = '<div class="empty-state"><span class="spinner dark"></span><p style="margin-top:0.75rem;">Loading notifications...</p></div>';

            try {
                const res = await apiCall(`api/notifications?tab=${tab}&sort=${sort}&threshold=${threshold}`);
                const notifications = res.data || [];
                notificationData = notifications;

                if (notifications.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="bell-off" style="width:48px;height:48px;opacity:0.3;display:block;margin:0 auto 0.75rem;"></i>
                            <p style="font-weight:500;color:var(--text-dark);">No notifications</p>
                            <p>No expiring vehicles found for the selected filters</p>
                        </div>`;
                    updateBadges(0, 0, 0);
                    lucide.createIcons();
                    return;
                }

                const tabLabels = { fc: 'FC Date', np: 'National Permit', permit: 'Permit', road_tax: 'Road Tax' };
                const tabLabel = tabLabels[tab] || tab;

                let critical = 0, warning = 0, normal = 0;

                container.innerHTML = notifications.map((n, i) => {
                    // Use days_left from API if available, otherwise compute
                    const days = (n.days_left !== undefined) ? n.days_left : daysUntil(n.expiry_date);
                    const expiryDate = n.expiry_date || n.fc_expiry_date || n[tab] || '';

                    let urgency, urgencyLabel, iconClass, iconName;
                    if (days <= 0) {
                        urgency = 'expired'; urgencyLabel = 'Expired'; iconClass = 'danger'; iconName = 'alert-circle';
                        critical++;
                    } else if (days <= 7) {
                        urgency = 'critical'; urgencyLabel = 'Critical'; iconClass = 'danger'; iconName = 'alert-circle';
                        critical++;
                    } else if (days <= 15) {
                        urgency = 'warning'; urgencyLabel = 'Warning'; iconClass = 'warning'; iconName = 'alert-triangle';
                        warning++;
                    } else {
                        urgency = 'normal'; urgencyLabel = 'Normal'; iconClass = 'success'; iconName = 'clock';
                        normal++;
                    }

                    // Date color class
                    let dateColorClass;
                    if (days <= 0) {
                        dateColorClass = 'date-expired';
                    } else if (days <= 7) {
                        dateColorClass = 'date-today';
                    } else {
                        dateColorClass = 'date-future';
                    }

                    const daysText = days < 0 ? `Expired ${Math.abs(days)} days ago` : days === 0 ? 'Expires today!' : `${days} days remaining`;

                    return `
                    <div class="notification-card mb-3">
                        <div class="notification-icon ${iconClass}">
                            <i data-lucide="${iconName}" style="width:20px;height:20px;"></i>
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.75rem;flex-wrap:wrap;">
                                <div>
                                    <p style="font-weight:600;color:var(--text-dark);margin:0;font-size:0.9rem;">${n.client_name || 'Unknown'}</p>
                                    <p style="font-size:0.75rem;color:var(--text-muted);margin:0.15rem 0 0;">${n.company || '—'} · <span class="vehicle-number" style="font-size:0.75rem;">${n.vehicle_number || '—'}</span></p>
                                </div>
                                <div style="display:flex;align-items:center;gap:0.5rem;">
                                    <button class="notification-edit-btn" onclick='openEditFromNotification(${JSON.stringify(n).replace(/'/g, "&#39;")})' title="Edit vehicle details">
                                        <i data-lucide="pencil" style="width:12px;height:12px;"></i> Edit
                                    </button>
                                    <span class="urgency-badge ${urgency}">${urgencyLabel}</span>
                                </div>
                            </div>
                            <div style="display:flex;gap:1.5rem;margin-top:0.75rem;flex-wrap:wrap;">
                                <div>
                                    <p style="font-size:0.65rem;color:var(--text-muted);margin:0;text-transform:uppercase;letter-spacing:0.05em;">${tabLabel} Date</p>
                                    <p class="${dateColorClass}" style="font-size:0.85rem;margin:0.15rem 0 0;">${formatDate(expiryDate)}</p>
                                </div>
                                <div>
                                    <p style="font-size:0.65rem;color:var(--text-muted);margin:0;text-transform:uppercase;letter-spacing:0.05em;">Status</p>
                                    <p class="${dateColorClass}" style="font-size:0.85rem;margin:0.15rem 0 0;">${daysText}</p>
                                </div>
                                <div>
                                    <p style="font-size:0.65rem;color:var(--text-muted);margin:0;text-transform:uppercase;letter-spacing:0.05em;">Phone</p>
                                    <p style="font-size:0.85rem;font-weight:500;color:var(--text-dark);margin:0.15rem 0 0;">${n.phone || '—'}</p>
                                </div>
                                <div>
                                    <p style="font-size:0.65rem;color:var(--text-muted);margin:0;text-transform:uppercase;letter-spacing:0.05em;">Vehicle Type</p>
                                    <p style="font-size:0.85rem;font-weight:500;color:var(--text-dark);margin:0.15rem 0 0;">${n.vehicle_type || '—'}</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                updateBadges(critical, warning, normal);
                lucide.createIcons();
            } catch (err) {
                container.innerHTML = `<div class="empty-state"><i data-lucide="wifi-off" style="width:48px;height:48px;opacity:0.3;display:block;margin:0 auto 0.75rem;"></i><p>Failed to load notifications</p></div>`;
                lucide.createIcons();
            }
        }

        function updateBadges(c, w, n) {
            document.getElementById('criticalCount').textContent = `${c} Critical`;
            document.getElementById('warningCount').textContent = `${w} Warnings`;
            document.getElementById('normalCount').textContent = `${n} Normal`;
        }

        // ============ EDIT VEHICLE FROM NOTIFICATION ============
        async function openEditFromNotification(n) {
            // We need to fetch the full vehicle detail first using the vehicle ID
            const vehicleId = n.id;
            try {
                // Fetch all vehicles and find this one (API does not have a single vehicle fetch)
                const res = await apiCall('api/vehicles?vehicle_number=' + encodeURIComponent(n.vehicle_number));
                const vehicles = res.data || [];
                const v = vehicles.find(veh => veh.id === vehicleId) || vehicles[0];

                if (!v) {
                    showToast('Could not find vehicle details.', 'error');
                    return;
                }

                document.getElementById('editVehicleId').value = v.id;
                document.getElementById('editOwnerName').value = v.client_name || '';
                document.getElementById('editPhone').value = v.phone || '';
                document.getElementById('editCompany').value = v.company || '';
                document.getElementById('editVehicleNumber').value = v.vehicle_number || '';
                document.getElementById('editVehicleType').value = v.vehicle_type || '';
                document.getElementById('editRoadTaxAmount').value = v.road_tax_amount || '';
                document.getElementById('editFcExpiry').value = v.fc_expiry_date ? v.fc_expiry_date.split('T')[0] : '';
                document.getElementById('editNp').value = v.np ? v.np.split('T')[0] : '';
                document.getElementById('editPermit').value = v.permit ? v.permit.split('T')[0] : '';
                document.getElementById('editRoadTax').value = v.road_tax ? v.road_tax.split('T')[0] : '';
                document.getElementById('editNotes').value = v.notes || '';

                document.getElementById('editModal').classList.add('active');
                document.body.classList.add('modal-open');
                lucide.createIcons();
            } catch (err) {
                showToast('Failed to load vehicle details for editing.', 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.body.classList.remove('modal-open');
        }

        // Close modal on overlay click
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeEditModal();
        });

        // Form submit
        document.getElementById('editVehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('editSubmitBtn');
            const editId = document.getElementById('editVehicleId').value;

            const payload = {
                client_name: document.getElementById('editOwnerName').value.trim(),
                phone: document.getElementById('editPhone').value.trim(),
                company: document.getElementById('editCompany').value.trim(),
                vehicle_number: document.getElementById('editVehicleNumber').value.trim(),
                vehicle_type: document.getElementById('editVehicleType').value,
                fc_expiry_date: document.getElementById('editFcExpiry').value,
                np: document.getElementById('editNp').value || null,
                permit: document.getElementById('editPermit').value || null,
                road_tax: document.getElementById('editRoadTax').value || null,
                road_tax_amount: parseFloat(document.getElementById('editRoadTaxAmount').value) || null,
                notes: document.getElementById('editNotes').value.trim() || null
            };

            btn.disabled = true;
            document.getElementById('editSubmitText').textContent = 'Saving...';

            try {
                const res = await apiCall(`api/vehicles/${editId}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });

                if (res.success) {
                    showToast(res.message || 'Vehicle updated successfully.', 'success');
                    closeEditModal();
                    loadNotifications();
                } else {
                    showToast(res.message || 'Update failed.', 'error');
                }
            } catch (err) {
                const errMsg = (err.data && err.data.message) || err.message || 'Update failed.';
                showToast(errMsg, 'error');
            } finally {
                btn.disabled = false;
                document.getElementById('editSubmitText').textContent = 'Save Changes';
            }
        });

        populateVehicleTypes('editVehicleType');
        loadNotifications();
    </script>
</body>
</html>
