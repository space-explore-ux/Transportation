<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - CRM</title>
    <meta name="description" content="Manage CRM users and administrators">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="header-container"></div>
            <div class="page-content custom-scrollbar">

                <!-- Page Title -->
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
                    <div>
                        <h2 style="font-size:1.25rem;font-weight:700;color:var(--text-dark);margin:0;">User Management</h2>
                        <p style="font-size:0.8rem;color:var(--text-muted);margin:0.25rem 0 0;">Manage system users and access control</p>
                    </div>
                    <div style="display:flex;gap:0.75rem;">
                        <button class="btn-primary" onclick="openAddUserModal()">
                            <i data-lucide="user-plus" style="width:16px;height:16px;"></i> Add User
                        </button>
                    </div>
                </div>

                <!-- Users Table -->
                <div class="glass-card overflow-hidden">
                    <div class="data-table-header">
                        <div class="data-table-title">
                            <h2>Registered Users</h2>
                            <p>All active system users</p>
                        </div>
                        <div class="data-table-actions">
                            <div class="search-input-wrapper">
                                <i data-lucide="search"></i>
                                <input type="text" id="userSearch" class="search-input" placeholder="Search users...">
                            </div>
                        </div>
                    </div>

                    <div style="overflow-x:auto;" class="custom-scrollbar">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Created At</th>
                                    <th style="text-align:center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr><td colspan="6" class="empty-state"><span class="spinner dark"></span> Loading users...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination-wrapper">
                        <span class="pagination-info" id="userPaginationInfo">Showing 0 entries</span>
                        <div class="pagination-buttons" id="userPaginationBtns"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i data-lucide="user-plus" style="width:20px;height:20px;display:inline;vertical-align:text-bottom;color:var(--primary);margin-right:0.5rem;"></i>Add New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="addUserForm">
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="addName" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="addEmail" placeholder="user@company.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="addPassword" placeholder="Minimum 6 characters" required minlength="6">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn-primary" id="addUserBtn">
                            <i data-lucide="plus" style="width:16px;height:16px;"></i> Create User
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i data-lucide="user-pen" style="width:20px;height:20px;display:inline;vertical-align:text-bottom;color:var(--primary);margin-right:0.5rem;"></i>Edit User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="editUserForm">
                    <div class="modal-body">
                        <input type="hidden" id="editUserId">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="editName" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="editEmail" placeholder="user@company.com" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn-primary" id="editUserBtn">
                            <i data-lucide="save" style="width:16px;height:16px;"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>



    <!-- Delete Confirm Modal -->
    <div class="modal fade" id="deleteUserModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content" style="text-align:center;">
                <div class="modal-body" style="padding:2rem;">
                    <div style="width:56px;height:56px;border-radius:50%;background:#fef2f2;color:var(--danger);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                        <i data-lucide="trash-2" style="width:24px;height:24px;"></i>
                    </div>
                    <h5 style="font-weight:700;color:var(--text-dark);margin-bottom:0.5rem;">Delete User?</h5>
                    <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1.5rem;">This action cannot be undone. The user will lose access permanently.</p>
                    <input type="hidden" id="deleteUserId">
                    <div style="display:flex;gap:0.75rem;justify-content:center;">
                        <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn-danger" onclick="confirmDeleteUser()" id="deleteUserBtn">
                            <i data-lucide="trash-2" style="width:16px;height:16px;"></i> Delete
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = generateSidebarHTML('users');
        document.getElementById('header-container').innerHTML = generateHeaderHTML();

        let allUsers = [];
        let userPage = 1;
        const usersPerPage = 10;

        // Modal instances
        let addModal, editModal, deleteModal;
        document.addEventListener('DOMContentLoaded', () => {
            addModal = new bootstrap.Modal(document.getElementById('addUserModal'));
            editModal = new bootstrap.Modal(document.getElementById('editUserModal'));
            deleteModal = new bootstrap.Modal(document.getElementById('deleteUserModal'));
        });

        function openAddUserModal() { 
            document.getElementById('addUserForm').reset();
            addModal.show(); 
        }

        // Load users
        async function loadUsers() {
            try {
                const data = await apiCall('/api/users');
                allUsers = data.data || data.users || data || [];
                renderUsers();
            } catch (err) {
                document.getElementById('usersTableBody').innerHTML =
                    `<tr><td colspan="6" class="empty-state">Failed to load users</td></tr>`;
            }
        }

        function renderUsers() {
            const search = document.getElementById('userSearch').value.toLowerCase();
            let filtered = allUsers.filter(u => {
                return `${u.name} ${u.email} ${u.role}`.toLowerCase().includes(search);
            });

            const total = filtered.length;
            const totalPages = Math.ceil(total / usersPerPage);
            if (userPage > totalPages) userPage = 1;
            const start = (userPage - 1) * usersPerPage;
            const pageData = filtered.slice(start, start + usersPerPage);

            const tbody = document.getElementById('usersTableBody');

            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><i data-lucide="users" style="width:40px;height:40px;opacity:0.3;display:block;margin:0 auto 0.5rem;"></i> No users found</td></tr>`;
                lucide.createIcons();
                return;
            }

            tbody.innerHTML = pageData.map((u, i) => {
                const color = getAvatarColor(start + i);
                const initials = getInitials(u.name);
                return `<tr>
                    <td style="color:var(--text-muted);font-weight:500;">${u.id || start + i + 1}</td>
                    <td>
                        <div class="table-user-cell">
                            <div class="table-avatar ${color}">${initials}</div>
                            <div>
                                <p class="table-user-name">${u.name || '—'}</p>
                            </div>
                        </div>
                    </td>
                    <td style="color:var(--text-default);">${u.email || '—'}</td>
                    <td><span class="type-badge">${u.role || 'user'}</span></td>
                    <td><span style="font-size:0.75rem;color:var(--text-muted);">${formatDate(u.created_at)}</span></td>
                    <td style="text-align:center;">
                        <button class="table-action-btn" title="Edit" onclick='openEditModal(${JSON.stringify(u)})'>
                            <i data-lucide="pencil" style="width:15px;height:15px;"></i>
                        </button>
                        <button class="table-action-btn" title="Delete" style="color:var(--danger);" onclick="openDeleteModal(${u.id})">
                            <i data-lucide="trash-2" style="width:15px;height:15px;"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('userPaginationInfo').textContent = `Showing ${start+1}–${Math.min(start+usersPerPage, total)} of ${total}`;

            let btns = '';
            btns += `<button class="page-btn" onclick="goUserPage(${userPage-1})" ${userPage===1?'disabled':''}><i data-lucide="chevron-left" style="width:14px;height:14px;"></i></button>`;
            for (let p = 1; p <= totalPages && p <= 5; p++) {
                btns += `<button class="page-btn ${p===userPage?'active':''}" onclick="goUserPage(${p})">${p}</button>`;
            }
            btns += `<button class="page-btn" onclick="goUserPage(${userPage+1})" ${userPage>=totalPages?'disabled':''}><i data-lucide="chevron-right" style="width:14px;height:14px;"></i></button>`;
            document.getElementById('userPaginationBtns').innerHTML = btns;
            lucide.createIcons();
        }

        function goUserPage(p) { userPage = p; renderUsers(); }

        document.getElementById('userSearch').addEventListener('input', () => {
            userPage = 1;
            renderUsers();
        });

        // Add User
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('addUserBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating...';
            try {
                await apiCall('/api/users', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: document.getElementById('addName').value.trim(),
                        email: document.getElementById('addEmail').value.trim(),
                        password: document.getElementById('addPassword').value
                    })
                });
                showToast('User created successfully!', 'success');
                addModal.hide();
                loadUsers();
            } catch (err) {
                showToast(err.message || 'Failed to create user', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="plus" style="width:16px;height:16px;"></i> Create User';
                lucide.createIcons({ nodes: [btn] });
            }
        });

        // Edit User
        function openEditModal(user) {
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editName').value = user.name || '';
            document.getElementById('editEmail').value = user.email || '';
            editModal.show();
        }

        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('editUserBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Saving...';
            try {
                const id = document.getElementById('editUserId').value;
                await apiCall(`/api/users/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        name: document.getElementById('editName').value.trim(),
                        email: document.getElementById('editEmail').value.trim()
                    })
                });
                showToast('User updated successfully!', 'success');
                editModal.hide();
                loadUsers();
            } catch (err) {
                showToast(err.message || 'Failed to update user', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="save" style="width:16px;height:16px;"></i> Save Changes';
                lucide.createIcons({ nodes: [btn] });
            }
        });

        // Delete User
        function openDeleteModal(userId) {
            document.getElementById('deleteUserId').value = userId;
            deleteModal.show();
        }

        async function confirmDeleteUser() {
            const id = document.getElementById('deleteUserId').value;
            const btn = document.getElementById('deleteUserBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Deleting...';
            try {
                await apiCall(`/api/users/${id}`, { method: 'DELETE' });
                showToast('User deleted successfully!', 'success');
                deleteModal.hide();
                loadUsers();
            } catch (err) {
                showToast(err.message || 'Failed to delete user', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="trash-2" style="width:16px;height:16px;"></i> Delete';
                lucide.createIcons({ nodes: [btn] });
            }
        }

        loadUsers();
    </script>
</body>
</html>
