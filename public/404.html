<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .error-wrapper {
            background:
                radial-gradient(ellipse at 30% 40%, rgba(124,58,237,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(239,68,68,0.04) 0%, transparent 50%),
                var(--bg-body);
        }
        .error-illustration {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .error-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px dashed var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-ring 3s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .error-subtitle {
            font-size: 1.1rem;
            color: var(--text-default);
            max-width: 400px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <div class="error-illustration">
            <div class="error-ring">
                <div class="error-icon">
                    <i data-lucide="alert-triangle" style="width:44px;height:44px;"></i>
                </div>
            </div>
        </div>

        <div class="error-code">404</div>
        <h1 style="font-size:1.75rem;font-weight:700;color:var(--text-dark);margin-bottom:0.75rem;">Page Not Found</h1>
        <p class="error-subtitle">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>

        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center;">
            <a href="index.html" class="btn-primary" style="padding:0.75rem 1.75rem;font-size:0.9rem;">
                <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
                Return to Dashboard
            </a>
            <a href="login.html" class="btn-outline" style="padding:0.75rem 1.75rem;font-size:0.9rem;">
                <i data-lucide="log-in" style="width:18px;height:18px;"></i>
                Go to Login
            </a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
