<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - CRM</title>
    <meta name="description" content="View your profile and manage account settings">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1050;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        body.modal-open { overflow: hidden; }
        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 440px;
            padding: 1.75rem;
            box-shadow: 0 24px 48px rgba(0,0,0,0.15);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .btn-secondary {
            padding: 0.6rem 1.25rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-default);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: var(--border-light); }
    </style>
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="header-container"></div>
            <div class="page-content custom-scrollbar">

                <!-- Page Title -->
                <div style="margin-bottom:1.5rem;">
                    <h2 style="font-size:1.25rem;font-weight:700;color:var(--text-dark);margin:0;">My Profile</h2>
                    <p style="font-size:0.8rem;color:var(--text-muted);margin:0.25rem 0 0;">Your account details and security settings</p>
                </div>

                <!-- Profile Card - Side Layout -->
                <div class="glass-card" style="padding:2rem;">
                    <div class="profile-side-layout">
                        <div class="profile-side-left">
                            <div class="my-profile-avatar" id="profileAvatar">JD</div>
                            <h3 class="my-profile-name" id="profileName" style="margin-top:0.75rem;">Loading...</h3>
                            <span class="type-badge" id="profileRole" style="font-size:0.75rem;padding:0.25rem 0.75rem;">User</span>
                        </div>
                        <div class="profile-side-right">
                            <div class="my-profile-info">
                                <div class="my-profile-row">
                                    <div class="my-profile-row-icon">
                                        <i data-lucide="user" style="width:16px;height:16px;"></i>
                                    </div>
                                    <div>
                                        <p class="my-profile-row-label">Full Name</p>
                                        <p class="my-profile-row-value" id="detailName">—</p>
                                    </div>
                                </div>
                                <div class="my-profile-row">
                                    <div class="my-profile-row-icon">
                                        <i data-lucide="mail" style="width:16px;height:16px;"></i>
                                    </div>
                                    <div>
                                        <p class="my-profile-row-label">Email</p>
                                        <p class="my-profile-row-value" id="detailEmail">—</p>
                                    </div>
                                </div>
                                <div class="my-profile-row">
                                    <div class="my-profile-row-icon">
                                        <i data-lucide="shield" style="width:16px;height:16px;"></i>
                                    </div>
                                    <div>
                                        <p class="my-profile-row-label">Role</p>
                                        <p class="my-profile-row-value" id="detailRole">—</p>
                                    </div>
                                </div>
                            </div>

                            <div style="display:flex;gap:0.75rem;margin-top:1.25rem;flex-wrap:wrap;">
                                <button class="btn-primary" onclick="openChangePasswordModal()" style="flex:1;justify-content:center;padding:0.65rem;">
                                    <i data-lucide="key-round" style="width:16px;height:16px;"></i> Change Password
                                </button>
                                <button class="btn-danger" onclick="logout()" style="flex:1;justify-content:center;padding:0.65rem;">
                                    <i data-lucide="log-out" style="width:16px;height:16px;"></i> Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Change Password Modal -->
    <div class="modal-overlay" id="changePasswordModal">
        <div class="modal-box">
            <h3 class="modal-title">
                <i data-lucide="key-round" style="width:20px;height:20px;color:var(--primary);"></i>
                Change Password
            </h3>
            <form id="changePasswordForm" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="oldPassword">Current Password</label>
                    <input type="password" class="form-control" id="oldPassword" placeholder="Enter current password" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input type="password" class="form-control" id="newPassword" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required minlength="6">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeChangePasswordModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="changePassBtn" style="padding:0.6rem 1.5rem;">
                        <i data-lucide="shield-check" style="width:16px;height:16px;"></i>
                        <span id="changePassText">Update Password</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = generateSidebarHTML('myprofile');
        document.getElementById('header-container').innerHTML = generateHeaderHTML();

        // Update page title from config
        document.title = `My Profile - ${getConfig('appTitle', 'CRM')}`;

        // Populate profile info
        const user = getUser();
        if (user) {
            const name = user.name || 'User';
            document.getElementById('profileAvatar').textContent = getInitials(name);
            document.getElementById('profileName').textContent = name;
            document.getElementById('profileRole').textContent = user.role || 'User';
            document.getElementById('detailName').textContent = name;
            document.getElementById('detailEmail').textContent = user.email || '—';
            document.getElementById('detailRole').textContent = user.role || 'User';
        }

        // Change Password Modal
        function openChangePasswordModal() {
            document.getElementById('changePasswordForm').reset();
            document.getElementById('changePasswordModal').classList.add('active');
            document.body.classList.add('modal-open');
            lucide.createIcons();
        }

        function closeChangePasswordModal() {
            document.getElementById('changePasswordModal').classList.remove('active');
            document.body.classList.remove('modal-open');
        }

        // Close modal on overlay click
        document.getElementById('changePasswordModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeChangePasswordModal();
        });

        // Change Password Submit
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass !== confirmPass) {
                showToast('New passwords do not match', 'error');
                return;
            }

            const btn = document.getElementById('changePassBtn');
            btn.disabled = true;
            document.getElementById('changePassText').textContent = 'Updating...';

            try {
                await apiCall('/api/users/password/change', {
                    method: 'PUT',
                    body: JSON.stringify({
                        oldPassword: document.getElementById('oldPassword').value,
                        newPassword: newPass
                    })
                });
                showToast('Password changed successfully!', 'success');
                closeChangePasswordModal();
            } catch (err) {
                showToast(err.message || 'Failed to change password', 'error');
            } finally {
                btn.disabled = false;
                document.getElementById('changePassText').textContent = 'Update Password';
            }
        });
    </script>
</body>
</html>
